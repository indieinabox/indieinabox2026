name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Cancel concurrent runs on the same branch (except main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint + Unit tests (Matrix PHP 8.2 → 8.4)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "PHP ${{ matrix.php }} — Tests & Lint"
    runs-on: codeberg-tiny
    strategy:
      fail-fast: true          # Stop at the first error in any version
      matrix:
        php: ["8.4"]

    steps:
      - name: "Checkout (full history for Psalm)"
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: "Setup PHP ${{ matrix.php }}"
        uses: https://github.com/shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, fileinfo
          coverage: xdebug          # Required to generate clover
          tools: composer:v2

      - name: "Cache vendor/"
        id: cache-vendor
        uses: https://github.com/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: vendor-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            vendor-php${{ matrix.php }}-

      - name: "Install Composer dependencies"
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --no-progress

      # ── Security ────────────────────────────────────────────────────────────
      - name: "composer audit — Known vulnerabilities"
        # Substitute for roave/security-advisories (conflicts with pest v3)
        run: composer audit --format=plain

      # ── PHP Version Compatibility ────────────────────────────────────────
      - name: "PHP Compatibility Sniffer (${{ matrix.php }})"
        run: |
          composer sniffer:php${{ matrix.php == '8.2' && '82' || matrix.php == '8.3' && '83' || '84' }}

      # ── Create dummy database config for tests ───────────────────────────
      - name: "Setup test database"
        run: |
          mkdir -p data
          echo "<?php return ['db_path' => __DIR__ . '/data/indieinabox.sqlite'];" > .config.php
          sqlite3 data/indieinabox.sqlite < database.sql

      # ── Bundle compilation (required for test:compiled) ─────────────────
      - name: "Compile bundle (php compile.php)"
        run: php compile.php

      # ── PEST Tests ──────────────────────────────────────────────────────────
      - name: "PEST — Standard suite (source) + Clover coverage"
        run: |
          mkdir -p coverage
          ./vendor/bin/pest \
            --coverage-clover coverage/clover.xml \
            --log-junit coverage/junit.xml

      - name: "PEST — Compiled suite"
        run: TEST_COMPILED=true ./vendor/bin/pest

      # ── Coverage artifacts ───────────────────────────────────────────────
      - name: "Upload Clover report"
        if: matrix.php == '8.4'          # Avoid duplicate uploads
        uses: https://github.com/actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-clover
          path: coverage/clover.xml
          retention-days: 7

      - name: "Upload JUnit report"
        if: matrix.php == '8.4'
        uses: https://github.com/actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-junit
          path: coverage/junit.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Static security analysis with Psalm
  # ─────────────────────────────────────────────────────────────────────────────
  psalm:
    name: "Psalm — Static Security Analysis"
    runs-on: codeberg-tiny
    needs: test           # Only runs if tests pass

    steps:
      - uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: https://github.com/shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: mbstring, json, fileinfo
          coverage: none
          tools: composer:v2

      - name: "Cache vendor/"
        id: cache-vendor
        uses: https://github.com/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: vendor-php8.4-${{ hashFiles('composer.lock') }}

      - name: "Install dependencies"
        run: |
          composer install --no-interaction --prefer-dist --no-progress

      - name: "Psalm — Analysis (taints + errors)"
        run: |
          mkdir -p coverage
          ./vendor/bin/psalm \
            --config=psalm.xml \
            --taint-analysis \
            --report=coverage/psalm.json \
            --report-show-info=true \
            --no-progress \
            --output-format=github   # Native PR annotations

      - name: "Upload Psalm report (JSON)"
        if: always()
        uses: https://github.com/actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: psalm-report
          path: coverage/psalm.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — OWASP Dependency-Check (CVEs in transitive dependencies)
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-check:
    name: "OWASP Dependency-Check"
    runs-on: codeberg-tiny
    needs: test

    steps:
      - uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Cache NVD (speeds up subsequent scans)"
        uses: https://github.com/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.dependency-check/data
          key: nvd-${{ github.run_id }}
          restore-keys: |
            nvd-

      - name: "Run OWASP Dependency-Check"
        uses: https://github.com/dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # v1.1.0
        id: depcheck
        with:
          project: "indieinabox"
          path: "."
          format: "HTML SARIF"
          out: "coverage/dependency-check"
          # CVSS >= 7 fails the build (adjust according to risk policy)
          args: >
            --failOnCVSS 7
            --enableRetired
            --exclude "**/vendor/**"

      - name: "Upload Dependency-Check report"
        if: always()
        uses: https://github.com/actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-report
          path: coverage/dependency-check
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — SonarQube / SonarCloud
  # Depends on previous jobs to have reports available
  # ─────────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: "SonarQube Analysis"
    runs-on: codeberg-tiny
    needs: [test, psalm]      # Requires coverage and Psalm reports
    # Only runs on main branch or PRs (avoids running on feature branches without SONAR_TOKEN)
    if: github.actor != 'dependabot[bot]'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: "Verify SONAR_TOKEN"
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::warning::SONAR_TOKEN not configured. Skipping SonarQube analysis."
          fi

      - uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: env.SONAR_TOKEN != ''
        with:
          fetch-depth: 0   # Required for blame and history in Sonar

      - name: "Download Clover report"
        if: env.SONAR_TOKEN != ''
        uses: https://github.com/actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-clover
          path: coverage

      - name: "Download Psalm report"
        if: env.SONAR_TOKEN != ''
        uses: https://github.com/actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: psalm-report
          path: coverage

      # ── Option A: SonarCloud (Free SaaS for open source) ─────────────────
      - name: "SonarCloud Scan"
        if: env.SONAR_TOKEN != ''
        uses: https://github.com/SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'lumenpink_indieinabox' }}
            -Dsonar.organization=${{ vars.SONAR_ORG || 'lumenpink' }}
            -Dsonar.php.coverage.reportPaths=coverage/clover.xml
            -Dsonar.externalIssuesReportPaths=coverage/psalm.json

      # ── Option B: SonarQube self-hosted (uncomment if preferred) ──────────────
      # - name: "SonarQube Scan (self-hosted)"
      #   if: env.SONAR_TOKEN != ''
      #   uses: https://github.com/SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      #   env:
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
