name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Cancela runs concorrentes no mesmo branch (exceto main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint + Testes unitários (Matrix PHP 8.2 → 8.4)
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "PHP ${{ matrix.php }} — Tests & Lint"
    runs-on: codeberg-tiny
    strategy:
      fail-fast: true          # Para ao primeiro erro em qualquer versão
      matrix:
        php: ["8.4"]

    steps:
      - name: "Checkout (histórico completo para Psalm)"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: "Setup PHP ${{ matrix.php }}"
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, fileinfo
          coverage: xdebug          # Necessário para gerar clover
          tools: composer:v2

      - name: "Cache vendor/"
        id: cache-vendor
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: vendor-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            vendor-php${{ matrix.php }}-

      - name: "Instalar dependências Composer"
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: composer install --no-interaction --prefer-dist --no-progress

      # ── Segurança ────────────────────────────────────────────────────────────
      - name: "composer audit — Vulnerabilidades conhecidas"
        # Substituto ao roave/security-advisories (conflita com pest v3)
        run: composer audit --format=plain

      # ── Compatibilidade de versão PHP ────────────────────────────────────────
      - name: "PHP Compatibility Sniffer (${{ matrix.php }})"
        run: |
          composer sniffer:php${{ matrix.php == '8.2' && '82' || matrix.php == '8.3' && '83' || '84' }}

      # ── Compilação do bundle (necessário para test:compiled) ─────────────────
      - name: "Compilar bundle (php compile.php)"
        run: php compile.php

      # ── Testes PEST ──────────────────────────────────────────────────────────
      - name: "PEST — Suite padrão (source) + cobertura Clover"
        run: |
          mkdir -p coverage
          ./vendor/bin/pest \
            --coverage-clover coverage/clover.xml \
            --log-junit coverage/junit.xml

      - name: "PEST — Suite compilada"
        run: TEST_COMPILED=true ./vendor/bin/pest

      # ── Artefatos de cobertura ───────────────────────────────────────────────
      - name: "Upload relatório Clover"
        if: matrix.php == '8.4'          # Evita uploads duplicados
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-clover
          path: coverage/clover.xml
          retention-days: 7

      - name: "Upload relatório JUnit"
        if: matrix.php == '8.4'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-junit
          path: coverage/junit.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Análise estática de segurança com Psalm
  # ─────────────────────────────────────────────────────────────────────────────
  psalm:
    name: "Psalm — Static Security Analysis"
    runs-on: codeberg-tiny
    needs: test           # Só roda se os testes passarem

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: https://github.com/shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.4"
          extensions: mbstring, json, fileinfo
          coverage: none
          tools: composer:v2

      - name: "Cache vendor/"
        id: cache-vendor
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: vendor-php8.4-${{ hashFiles('composer.lock') }}

      - name: "Instalar dependências"
        run: |
          composer install --no-interaction --prefer-dist --no-progress

      - name: "Psalm — Análise (taint + erros)"
        run: |
          mkdir -p coverage
          ./vendor/bin/psalm \
            --config=psalm.xml \
            --taint-analysis \
            --report=coverage/psalm.json \
            --report-show-info=true \
            --no-progress \
            --output-format=github   # Anotações nativas no PR

      - name: "Upload relatório Psalm (JSON)"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: psalm-report
          path: coverage/psalm.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — OWASP Dependency-Check (CVEs em dependências transitivas)
  # ─────────────────────────────────────────────────────────────────────────────
  dependency-check:
    name: "OWASP Dependency-Check"
    runs-on: codeberg-tiny
    needs: test

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Cache NVD (acelera scans subsequentes)"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.dependency-check/data
          key: nvd-${{ github.run_id }}
          restore-keys: |
            nvd-

      - name: "Executar OWASP Dependency-Check"
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # v1.1.0
        id: depcheck
        with:
          project: "indieinabox"
          path: "."
          format: "HTML SARIF"
          out: "coverage/dependency-check"
          # CVSS >= 7 falha o build (ajustar conforme política de risco)
          args: >
            --failOnCVSS 7
            --enableRetired
            --exclude "**/vendor/**"

      - name: "Upload relatório Dependency-Check"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-report
          path: coverage/dependency-check
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — SonarQube / SonarCloud
  # Depende dos jobs anteriores para ter os relatórios disponíveis
  # ─────────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: "SonarQube Analysis"
    runs-on: codeberg-tiny
    needs: [test, psalm]      # Precisa dos relatórios de cobertura e Psalm
    # Só roda no branch principal ou em PRs (evita rodar em feature branches sem SONAR_TOKEN)
    if: github.actor != 'dependabot[bot]'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: "Verificar SONAR_TOKEN"
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::warning::SONAR_TOKEN não configurado. Pulando análise do SonarQube."
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: env.SONAR_TOKEN != ''
        with:
          fetch-depth: 0   # Necessário para blame e histórico no Sonar

      - name: "Baixar relatório Clover"
        if: env.SONAR_TOKEN != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-clover
          path: coverage

      - name: "Baixar relatório Psalm"
        if: env.SONAR_TOKEN != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: psalm-report
          path: coverage

      # ── Opção A: SonarCloud (SaaS gratuito para open source) ─────────────────
      - name: "SonarCloud Scan"
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY || 'lumenpink_indieinabox' }}
            -Dsonar.organization=${{ vars.SONAR_ORG || 'lumenpink' }}
            -Dsonar.php.coverage.reportPaths=coverage/clover.xml
            -Dsonar.externalIssuesReportPaths=coverage/psalm.json

      # ── Opção B: SonarQube self-hosted (descomente se preferir) ──────────────
      # - name: "SonarQube Scan (self-hosted)"
      #   if: env.SONAR_TOKEN != ''
      #   uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
      #   env:
      #     SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
